<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptFlow Pro Sidepanel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">✨</span>
      <h1>PromptFlow <span class="pro">Pro</span></h1>
    </div>
  </header>

  <main>
    <p class="subtitle">Your ultimate AI productivity suite.</p>

    <div class="feature-grid">
      
      <div class="feature-card" id="btn-vault">
        <div class="card-icon blue">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <div class="card-content">
          <h3>Saved Prompts</h3>
          <p>Access your curated template library</p>
        </div>
      </div>

      <div class="feature-card" id="btn-craft">
        <div class="card-icon purple">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><path d="M3.27 6.96L12 12.01l8.73-5.05"></path><path d="M12 22.08V12"></path></svg>
        </div>
        <div class="card-content">
          <h3>Craft (Pollinations)</h3>
          <p>Generate highly optimized prompts</p>
        </div>
      </div>

      <div class="feature-card" id="btn-export">
        <div class="card-icon green">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </div>
        <div class="card-content">
          <h3>Export Chat</h3>
          <p>Export conversation cross-platform</p>
        </div>
      </div>

      <div class="feature-card" id="btn-settings">
        <div class="card-icon orange">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
        </div>
        <div class="card-content">
          <h3>Features & Settings</h3>
          <p>Configure shortcuts and models</p>
        </div>
      </div>

    </div>
  </main>

  <script>
    document.querySelectorAll('.feature-card').forEach(card => {
      card.addEventListener('click', () => {
        alert("PromptFlow Pro: " + card.querySelector('h3').innerText + " launched!");
      });
    });
  </script>
</body>
</html>
