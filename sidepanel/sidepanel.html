<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptFlow Pro Sidepanel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../popup/popup.css">
  <style>
    /* Overrides for sidepanel */
    body {
      width: 100%;
      height: 100vh;
      border-radius: 0;
    }
    .prompt-grid {
      grid-template-columns: 1fr; /* Single column in narrow sidepanel */
    }
  </style>
</head>
<body>
  <!-- Same HTML structure as popup, but tailored for Sidepanel -->
  <header>
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <h1>PromptFlow <span class="pro">Pro</span></h1>
    </div>
    <div class="header-actions">
      <button id="theme-toggle" class="icon-btn" title="Toggle Theme">🌙</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-target="vault">Vault</button>
    <button class="tab" data-target="enhance">Enhance</button>
  </nav>

  <main>
    <section id="vault" class="tab-content active">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search prompts...">
      </div>
      <div class="vault-container" style="flex-direction: column;">
        <div class="prompt-grid" id="prompt-list"></div>
      </div>
    </section>
    
    <section id="enhance" class="tab-content">
      <textarea id="enhance-input" placeholder="Paste prompt..."></textarea>
      
      <div class="enhance-modes" style="margin-top: 12px; margin-bottom: 12px;">
        <label class="mode-card">
          <input type="radio" name="enhance-mode" value="clarify" checked>
          <span class="mode-icon">📝</span>
          <div class="mode-details">
            <span class="mode-title">Clarify</span>
          </div>
        </label>
        <label class="mode-card">
          <input type="radio" name="enhance-mode" value="structured">
          <span class="mode-icon">🎯</span>
          <div class="mode-details">
            <span class="mode-title">Structured</span>
          </div>
        </label>
      </div>

      <button id="enhance-btn" class="primary-btn full-width">✨ Enhance</button>
      <div id="enhance-result" class="hidden" style="margin-top: 12px;">
        <textarea id="enhance-output" readonly></textarea>
      </div>
    </section>
  </main>

  <script src="../popup/popup.js"></script>
</body>
</html>
